version: '3.8'

services:
    mc-scheduler:
        build:  
            context: .
        container_name: mc-scheduler
        image: mc-scheduler:v1.0
        restart: always
        command: >
            /bin/bash -c "
                # Wait for MySQL
                sleep 10

                # Clean up pid
                rm -f airflow-webserver.pid

                # Set up metadata database
                airflow db upgrade

                # Create default user
                airflow users create --username admin --password admin --email admin@innogrid.com --firstname admin --lastname admin --role Admin

                # Import variables & Make connections
                airflow variables import -a overwrite /usr/local/airflow/airflow_variables.json
                airflow connections add --conn-type mysql --conn-host 127.0.0.1  --conn-schema mc_temp --conn-login root --conn-password 1234 --conn-port 3306 mcmp

                # Reload & Run dags
                airflow dags reserialize
                airflow dags unpause get_db_info
                airflow dags unpause down_sampling

                # Start airflow
                airflow scheduler & airflow webserver -p 9001

                # Keep the server on no matter what
                sleep infinity
            "
        volumes:
                - ./mc-airflow/airflow-home:/usr/local/airflow
        network_mode: "host"

